name: FHRR Alignment Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run FHRR Agent Tests
      run: |
        python -m engine.active_inference_agent
    
    - name: Run Cross-Space Alignment Tests
      run: |
        python -m engine.cross_space_alignment
    
    - name: Run Alignment Budget Analysis
      run: |
        python -m engine.alignment_budget_analysis
